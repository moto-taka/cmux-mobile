<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1b26">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="cmux">
  <title>cmux</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Overlay for sidebar backdrop -->
  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" aria-label="Workspaces">
    <div class="sidebar-header">
      <span class="sidebar-title">Workspaces</span>
      <div class="sidebar-actions">
        <button id="refresh-btn" class="icon-btn" aria-label="Refresh workspaces">&#8635;</button>
        <button id="sidebar-close" class="icon-btn" aria-label="Close sidebar">&times;</button>
      </div>
    </div>
    <ul id="workspace-list" class="workspace-list"></ul>
  </aside>

  <!-- Main layout -->
  <div class="main-layout">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button id="menu-btn" class="icon-btn" aria-label="Open menu">&#9776;</button>
        <span id="workspace-name" class="workspace-name">cmux</span>
        <span id="conn-status" class="conn-status" title="Disconnected"></span>
      </div>
      <div class="header-right">
        <button id="info-btn" class="icon-btn" aria-label="Toggle info panel">&#8505;</button>
      </div>
    </header>

    <!-- Surface tabs -->
    <nav id="surface-tabs" class="surface-tabs" aria-label="Surfaces"></nav>

    <!-- Terminal area -->
    <div class="terminal-area">
      <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Connecting to cmux...</div>
      </div>
      <div id="error-screen" class="error-screen" style="display:none">
        <div class="error-icon">&#9888;</div>
        <div class="error-text">Unable to connect</div>
        <div class="error-hint">Make sure cmux is running and the server is started</div>
        <button id="retry-btn" class="retry-btn">Retry</button>
      </div>
      <iframe id="ttyd-frame" class="ttyd-frame" style="display:none" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel" class="info-panel" aria-label="Workspace info">
    <div class="info-panel-header">
      <span class="info-panel-title">Workspace Info</span>
      <button id="info-close" class="icon-btn" aria-label="Close info panel">&times;</button>
    </div>
    <div id="info-content" class="info-content">
      <p class="info-empty">Select a workspace to view details.</p>
    </div>
  </div>

  <script src="app.js"></script>
  <div id="toast-container" class="toast-container"></div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
